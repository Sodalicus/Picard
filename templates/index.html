<html>
	<head>
        <meta charset="utf-8" />
		<title>Index</title>
        <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">
	</head>
	<body>
        <div id="mainbox">

        {% for device,status in data %}
        <div class="device_box"> 
          <div class="device_info">{{ device }} is: {{ status }}</div>  
        <form action="/switch" method="POST">
        <button class="device_button" type="submit">Switch</button>
        </form>
        </div>
        {% endfor %}
        


        <div class="device_box"> 
        Device#01
        <form action="/beep" method="POST">
        <button class="device_button" type="submit">Beep</button>
        </form>
        </div>

    
    <div class="device_box">
    Variable ledState: {{ ledState }}
    </br>
    {% for message in get_flashed_messages() %}
        {{ message }}
    {% endfor %}
    </div> 
        </div>
		
	</body>
</html>
